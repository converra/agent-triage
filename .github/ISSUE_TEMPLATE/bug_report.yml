name: Bug Report
description: Report a bug in converra-triage
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `npx converra-triage analyze --traces ...`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `npx converra-triage --version`"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: "Output of `node --version`"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs, screenshots, or anything else that might help.
